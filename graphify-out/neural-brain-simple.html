<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Second Brain Neural Network</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { margin: 0; padding: 0; }
body { background: #050510; overflow: hidden; font-family: system-ui; }
#graph { width: 100vw; height: 100vh; }
.title { position: fixed; top: 20px; left: 20px; }
.title h1 { color: #64b5f6; font-size: 22px; margin: 0; }
.title p { color: #8899cc; font-size: 12px; margin-top: 5px; }
</style>
</head>
<body>
<div class="title">
<h1>Second Brain Neural Network</h1>
<p>269 neurons • 405 synapses</p>
</div>
<svg id="graph"></svg>
<script>
fetch('graph.json').then(r=>r.json()).then(data=>{
const nodes=data.nodes, links=data.links;
nodes.forEach(n=>{ n.r=Math.max(4, 3+Math.sqrt(links.filter(l=>l.source==n.id||l.target==n.id).length)*2); });
const w=window.innerWidth,h=window.innerHeight,colors=['#00d4ff','#ff6b9d','#c084fc','#4ade80','#fbbf24'];
const svg=d3.select('#graph').attr('width',w).attr('height',h);
const g=svg.append('g');
svg.call(d3.zoom().on('zoom',e=>g.attr('transform',e.transform)));
const sim=d3.forceSimulation(nodes).force('link',d3.forceLink(links).id(d=>d.id).distance(60)).force('charge',d3.forceManyBody().strength(-150)).force('center',d3.forceCenter(w/2,h/2));
g.append('g').selectAll('line').data(links).enter().append('line').attr('stroke','#334455').attr('stroke-width',0.5).attr('stroke-opacity',0.3);
g.append('g').selectAll('circle').data(nodes).enter().append('circle').attr('r',d=>d.r).attr('fill',d=>colors[d.community%colors.length]).attr('stroke','#fff').attr('stroke-width',0.5).call(d3.drag());
sim.on('tick',()=>{ g.selectAll('line').attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y); g.selectAll('circle').attr('cx',d=>d.x).attr('cy',d=>d.y); });
});
</script>
</body>
</html>
